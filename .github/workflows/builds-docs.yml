name: github pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: windows-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Install MAUI workload
      run: dotnet workload install maui --source https://api.nuget.org/v3/index.json

    - name: Install wasm-tools workload
      run: dotnet workload install wasm-tools --source https://api.nuget.org/v3/index.json

    - name: Restore .NET tools
      run: dotnet tool restore

    - name: Build the assemblies
      run: dotnet build scripts/SkiaSharp.Extended-Pack.slnf -c Release -f net9.0

    - name: Publish Blazor sample
      run: dotnet publish samples/SkiaSharpDemo.Blazor/SkiaSharpDemo.Blazor.csproj -c Release -o publish/sample

    - name: Build docs
      run: dotnet docfx docs/docfx.json

    - name: Copy Blazor sample into docs site
      run: |
        New-Item -ItemType Directory -Path docs/_site/sample -Force
        Copy-Item -Path publish/sample/wwwroot/* -Destination docs/_site/sample -Recurse -Force
        if (Test-Path publish/sample/wwwroot/.nojekyll) { Copy-Item publish/sample/wwwroot/.nojekyll docs/_site/sample/ }

        # Rewrite base href for GitHub Pages deployment
        $indexPath = "docs/_site/sample/index.html"
        (Get-Content $indexPath -Raw) -replace '<base href="/" />', '<base href="/SkiaSharp.Extended/sample/" />' | Set-Content $indexPath

        # Generate 404.html for SPA routing on GitHub Pages
        @"
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="utf-8" />
            <title>SkiaSharp Extended - Blazor Demo</title>
            <script>
                // GitHub Pages SPA redirect: convert path to query string for index.html
                // segmentCount = number of path segments in the base href (e.g. 2 for /SkiaSharp.Extended/sample/)
                var segmentCount = 2;
                var l = window.location;
                l.replace(
                    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                    l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
                    l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
                    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                    l.hash
                );
            </script>
        </head>
        <body></body>
        </html>
        "@ | Set-Content "docs/_site/sample/404.html"
      shell: pwsh

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'docs/_site'

    - name: Deploy
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@v3.6.1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/_site
