name: "Docs - PR Staging - Deploy"

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'samples/SkiaSharpDemo.Blazor/**'
      - 'source/**'
      - 'scripts/**'
      - '.github/workflows/docs-deploy-staging-pr.yml'
    types: [ opened, synchronize, reopened ]

# Ensure documentation workflows run sequentially
concurrency:
  group: "docs-deployment"
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build the assemblies
        run: dotnet build scripts/SkiaSharp.Extended-Pack.slnf -c Release -f net10.0

      - name: Publish Blazor sample
        run: dotnet publish samples/SkiaSharpDemo.Blazor/SkiaSharpDemo.Blazor.csproj -c Release -o publish/sample

      - name: Build docs
        run: dotnet docfx docs/docfx.json

      - name: Copy Blazor sample into docs site for staging
        run: |
          $prNumber = "${{ github.event.number }}"
          $stagingBase = "/SkiaSharp.Extended/staging/$prNumber/sample/"

          New-Item -ItemType Directory -Path docs/_site/sample -Force
          Get-ChildItem -Path publish/sample/wwwroot -Force | Copy-Item -Destination docs/_site/sample -Recurse -Force

          # Rewrite base href for staging deployment
          $indexPath = "docs/_site/sample/index.html"
          (Get-Content $indexPath -Raw) -replace '<base href="/" />', "<base href=`"$stagingBase`" />" | Set-Content $indexPath

          # Update segmentCount in 404.html for the deeper staging path
          # Staging path: /SkiaSharp.Extended/staging/{pr}/sample/ = 4 segments
          $notFoundPath = "docs/_site/sample/404.html"
          if (Test-Path $notFoundPath) {
            (Get-Content $notFoundPath -Raw) -replace 'var segmentCount = \d+;', 'var segmentCount = 4;' | Set-Content $notFoundPath
          }
        shell: pwsh

      - name: Upload staging artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-site-${{ github.event.number }}
          path: docs/_site
          retention-days: 1

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-site-${{ github.event.number }}
          path: /tmp/staging-temp

      - name: Setup staging directory
        run: |
          mkdir -p staging/${{ github.event.number }}
          rm -rf staging/${{ github.event.number }}/*
          cp -r /tmp/staging-temp/. staging/${{ github.event.number }}/
          rm -rf /tmp/staging-temp

      - name: Commit and push staging
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add staging/${{ github.event.number }}
          if ! git diff --cached --quiet; then
            git commit -m "Deploy staging docs for PR #${{ github.event.number }}"
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi

  comment:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event.action == 'opened' || github.event.action == 'reopened'
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const stagingUrl = `https://mono.github.io/SkiaSharp.Extended/staging/${prNumber}/`;
            const sampleUrl = `https://mono.github.io/SkiaSharp.Extended/staging/${prNumber}/sample/`;

            const commentBody = `📖 **Documentation Preview**

            The documentation for this PR has been deployed and is available at:

            🔗 **[View Staging Documentation](${stagingUrl})**

            🔗 **[View Staging Blazor Sample](${sampleUrl})**

            This preview will be updated automatically when you push new commits to this PR.

            ---
            *This comment is automatically updated by the documentation staging workflow.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });
