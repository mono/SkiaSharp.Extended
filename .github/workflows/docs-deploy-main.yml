name: "Docs - Main - Deploy"

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'samples/SkiaSharpDemo.Blazor/**'
      - 'source/**'
      - 'scripts/**'
      - '.github/workflows/docs-deploy-main.yml'
  workflow_dispatch:

# Ensure documentation workflows run sequentially
concurrency:
  group: "docs-deployment"
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Build the assemblies
        run: dotnet build scripts/SkiaSharp.Extended-Pack.slnf -c Release -f net10.0

      - name: Publish Blazor sample
        run: dotnet publish samples/SkiaSharpDemo.Blazor/SkiaSharpDemo.Blazor.csproj -c Release -o publish/sample

      - name: Build docs
        run: dotnet docfx docs/docfx.json

      - name: Copy Blazor sample into docs site
        run: |
          New-Item -ItemType Directory -Path docs/_site/sample -Force
          Get-ChildItem -Path publish/sample/wwwroot -Force | Copy-Item -Destination docs/_site/sample -Recurse -Force

          # Rewrite base href for GitHub Pages deployment
          $indexPath = "docs/_site/sample/index.html"
          (Get-Content $indexPath -Raw) -replace '<base href="/" />', '<base href="/SkiaSharp.Extended/sample/" />' | Set-Content $indexPath
        shell: pwsh

      - name: Upload main site artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-site
          path: docs/_site
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download main site artifact
        uses: actions/download-artifact@v4
        with:
          name: main-site
          path: /tmp/main-temp

      - name: Setup main site content
        run: |
          find . -maxdepth 1 \
              -not -name 'staging' \
              -not -name '.git' \
              -not -name '.' \
              -not -name '..' \
            -exec rm -rf {} \;
          cp -r /tmp/main-temp/. .
          rm -rf /tmp/main-temp

      - name: Commit and push main site content
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Deploy main documentation from commit ${{ github.sha }}"
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi
