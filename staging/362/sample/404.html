<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>SkiaSharp Extended - Blazor Demo</title>
    <script>
        // GitHub Pages SPA redirect: convert path to query string for index.html
        // segmentCount = number of path segments in the base href (e.g. 2 for /SkiaSharp.Extended/sample/)
        var segmentCount = 4;
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>
<body></body>
</html>
