<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkiaSharp Extended - Blazor Demo</title>
    <base href="/SkiaSharp.Extended/staging/379/sample/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="SkiaSharpDemo.Blazor.styles.css" rel="stylesheet" />
    <!-- GitHub Pages SPA redirect handler (works with 404.html) -->
    <script>
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&');
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash);
            }
        }(window.location));
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.deepZoomRegisterResize = function (dotNetRef) {
            var handler = function () { dotNetRef.invokeMethodAsync('OnWindowResize'); };
            window.addEventListener('resize', handler);
            window._deepZoomResizeHandler = handler;
        };
        window.deepZoomUnregisterResize = function () {
            if (window._deepZoomResizeHandler) {
                window.removeEventListener('resize', window._deepZoomResizeHandler);
                window._deepZoomResizeHandler = null;
            }
        };

        // Browser tile cache: stores base64-encoded PNG tiles in sessionStorage.
        // Uses sessionStorage (not localStorage) so tiles are cleared on tab close.
        window.deepZoomCacheGet = function (key) {
            try { return sessionStorage.getItem('dz:' + key); } catch { return null; }
        };
        window.deepZoomCacheSet = function (key, base64png) {
            try { sessionStorage.setItem('dz:' + key, base64png); } catch { /* quota */ }
        };
        window.deepZoomCacheClear = function () {
            try {
                var toRemove = [];
                for (var i = 0; i < sessionStorage.length; i++) {
                    var k = sessionStorage.key(i);
                    if (k && k.startsWith('dz:')) toRemove.push(k);
                }
                toRemove.forEach(function (k) { sessionStorage.removeItem(k); });
            } catch { }
        };
        window.deepZoomCacheCount = function () {
            try {
                var n = 0;
                for (var i = 0; i < sessionStorage.length; i++) {
                    var k = sessionStorage.key(i);
                    if (k && k.startsWith('dz:')) n++;
                }
                return n;
            } catch { return 0; }
        };
    </script>
</body>

</html>
